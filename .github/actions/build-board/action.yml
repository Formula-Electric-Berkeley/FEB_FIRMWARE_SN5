name: 'Build STM32 Board'
description: 'Builds a single STM32 board firmware with ARM GCC toolchain'

inputs:
  board:
    description: 'Board / target name. Sensor_Nodes_FRONT and Sensor_Nodes_REAR are real CMake targets defined in Sensor_Nodes/CMakeLists.txt.'
    required: true
  build-type:
    description: 'Build type (Debug or Release)'
    required: false
    default: 'Debug'
  upload-artifacts:
    description: 'Whether to upload build artifacts'
    required: false
    default: 'true'
  artifact-suffix:
    description: 'Suffix to append to artifact name'
    required: false
    default: ''

outputs:
  skipped:
    description: 'Whether the build was skipped (missing files)'
    value: ${{ steps.check.outputs.skip }}
  elf-path:
    description: 'Path to the built ELF file'
    value: ${{ steps.paths.outputs.elf }}
  bin-path:
    description: 'Path to the built BIN file'
    value: ${{ steps.paths.outputs.bin }}
  hex-path:
    description: 'Path to the built HEX file'
    value: ${{ steps.paths.outputs.hex }}

runs:
  using: 'composite'
  steps:
    # Sensor_Nodes_FRONT / Sensor_Nodes_REAR live inside the Sensor_Nodes
    # source tree but are distinct CMake targets. Map the target name back
    # to the source directory for buildability checks and artifact paths.
    - name: Resolve target source dir
      id: resolve
      shell: bash
      run: |
        case "${{ inputs.board }}" in
          Sensor_Nodes_FRONT|Sensor_Nodes_REAR)
            echo "src_dir=Sensor_Nodes" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "src_dir=${{ inputs.board }}" >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Check buildability
      id: check
      shell: bash
      run: |
        SRC="${{ steps.resolve.outputs.src_dir }}"
        if [ ! -f "${SRC}/CMakeLists.txt" ] || [ ! -d "${SRC}/Core" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::warning::${{ inputs.board }} skipped -- missing ${SRC}/CMakeLists.txt or ${SRC}/Core/"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install ARM GCC Toolchain
      if: steps.check.outputs.skip != 'true'
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '14.2.Rel1'

    - name: Install Ninja
      if: steps.check.outputs.skip != 'true'
      shell: bash
      run: sudo apt-get install -y ninja-build

    - name: Configure CMake
      if: steps.check.outputs.skip != 'true'
      shell: bash
      run: |
        cmake -S . -B build/${{ inputs.board }} \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

    - name: Build
      if: steps.check.outputs.skip != 'true'
      shell: bash
      run: cmake --build build/${{ inputs.board }} --target ${{ inputs.board }}

    - name: Set output paths
      if: steps.check.outputs.skip != 'true'
      id: paths
      shell: bash
      run: |
        BASE="build/${{ inputs.board }}/${{ steps.resolve.outputs.src_dir }}"
        echo "elf=${BASE}/${{ inputs.board }}.elf" >> "$GITHUB_OUTPUT"
        echo "bin=${BASE}/${{ inputs.board }}.bin" >> "$GITHUB_OUTPUT"
        echo "hex=${BASE}/${{ inputs.board }}.hex" >> "$GITHUB_OUTPUT"

    - name: Upload artifacts
      if: steps.check.outputs.skip != 'true' && inputs.upload-artifacts == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.board }}-firmware${{ inputs.artifact-suffix }}
        path: |
          ${{ steps.paths.outputs.elf }}
          ${{ steps.paths.outputs.bin }}
          ${{ steps.paths.outputs.hex }}
