name: CubeMX Sync Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-sync:
    name: Validate IOC/Code Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check manifest exists
        id: check
        run: |
          if [ ! -f ".cubemx-manifest.json" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::CubeMX manifest not found - skipping validation"
            echo "### CubeMX Sync Validation Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No \`.cubemx-manifest.json\` found. Run \`./scripts/cubemx-sync.sh --update\` to create it." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CubeMX sync
        if: steps.check.outputs.skip != 'true'
        run: |
          set +e
          OUTPUT=$(./scripts/cubemx-sync.sh --validate 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi
